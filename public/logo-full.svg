<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 120" fill="none">
  <defs>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#F5A623" flood-opacity="0.4"/>
    </filter>
    <filter id="cyanglow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#06B6D4" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Hexagone icône -->
  <path d="M60 5L107 31V85L60 111L13 85V31Z" fill="#0F2040"/>
  <path d="M60 5L107 31V85L60 111L13 85V31Z" fill="none" stroke="#1A3560" stroke-width="1.5"/>
  <path d="M60 15L99 37V81L60 103L21 81V37Z" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Éclair -->
  <path d="M69 18L43 62H55L48 100L78 56H66L69 18Z" fill="#F5A623" filter="url(#glow)"/>

  <!-- Points lumineux -->
  <circle cx="34" cy="34" r="3" fill="#F5A623" opacity="0.25"/>
  <circle cx="86" cy="27" r="2" fill="#06B6D4" opacity="0.7" filter="url(#cyanglow)"/>

  <!-- VOLT — Solar Gold bold -->
  <text
    x="133"
    y="76"
    font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
    font-size="52"
    font-weight="800"
    letter-spacing="-1"
    fill="#F5A623"
  >VOLT</text>

  <!-- Séparateur -->
  <circle cx="285" cy="62" r="4" fill="#06B6D4" opacity="0.8"/>

  <!-- PILOT — blanc fin -->
  <text
    x="294"
    y="76"
    font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
    font-size="52"
    font-weight="300"
    letter-spacing="-1"
    fill="white"
    opacity="0.92"
  >PILOT</text>

  <!-- Tagline -->
  <text
    x="133"
    y="100"
    font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
    font-size="13"
    font-weight="500"
    letter-spacing="3.5"
    fill="rgba(255,255,255,0.28)"
  >LOGICIEL SOLAIRE PRO</text>
</svg>
